CONFIG_ZMK_KEYBOARD_NAME="dax3"

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_BLE=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# BLE信号強度向上: 左右対称性維持（左側エンコーダー操作性改善に合わせた設定）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_BAS=y

CONFIG_SPI=y
CONFIG_INPUT=y

# Enable encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_ZMK_SLEEP=y

CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=1000
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_180=y
CONFIG_PMW3610_SCROLL_TICK=64
CONFIG_PMW3610_INVERT_X=y
CONFIG_PMW3610_INVERT_Y=y
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_INVERT_SCROLL_Y=n
# RUN→REST1遷移時間: 操作停止後0.5秒でREST1へ（実効480ms, value=500/32=15）
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=500
# REST1サンプリング: デフォルト40msに戻し省電力（REST1_DOWNSHIFT 9600msは範囲内: 640-163200ms）
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=40
# REST2/REST3有効化: パワーダウンシフトチェーン完成
CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=100
CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=25600
CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=100
CONFIG_PMW3610_POLLING_RATE_125_SW=y
CONFIG_PMW3610_AUTOMOUSE_TIMEOUT_MS=100
# 移動閾値: 繊細な操作に反応しつつノイズをフィルタ（実測フィードバック対応）
CONFIG_PMW3610_MOVEMENT_THRESHOLD=1
CONFIG_PMW3610_SMART_ALGORITHM=y

CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=30
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_SHOW_LAYER_CHANGE=y

CONFIG_ZMK_POINTING=y

# OS layer switching based on BLE profile
# Profiles 0-2 default to -1 (no overlay, macOS)
CONFIG_ZMK_OS_LAYER=y
CONFIG_ZMK_OS_LAYER_PROFILE_3=7
CONFIG_ZMK_OS_LAYER_PROFILE_4=8
