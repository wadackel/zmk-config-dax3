version: '3.8'

services:
  zmk:
    image: zmkfirmware/zmk-build-arm:stable
    working_dir: /workspace
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      # Mount entire project root (including .west/, modules/, build/)
      - .:/workspace
    environment:
      - ZEPHYR_TOOLCHAIN_VARIANT=zephyr
      - ZEPHYR_SDK_INSTALL_DIR=/opt/zephyr-sdk-0.16.9
      # ccache configuration for faster rebuilds
      - CCACHE_DIR=/workspace/.ccache
      - CCACHE_MAXSIZE=2G
      - USE_CCACHE=1
    command: /bin/bash
    stdin_open: true
    tty: true
